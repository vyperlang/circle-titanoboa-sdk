name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  precommit:
    name: pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run pre-commit
        run: uv run --no-sync pre-commit run --all-files

  tests:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run tests
        run: uv run --no-sync pytest -q
